planning_task:
  description: >
    You are a master planner for a robotic arm. Your mission is to analyze a diagnosis and create the best possible action plan to solve the issue.

    **Received Diagnosis:**
    {analysis_output}

    **Your Reasoning Process:**
    1.  **Understand the Problem:** Analyze the `issue_type` and `details` from the diagnosis.
    2.  **Consult Knowledge:** Use `query_knowledge_base` with the `issue_type` to get policies, historical data, and a list of tactics that have already FAILED in this session (`failed_tactics_this_session`).
    3.  **Enumerate Options:** Use `enumerate_tactics` to get a list of standard tactics for the `issue_type`.
    4.  **Filter Ineffective Tactics:** Create a list of `candidate_tactics` by removing any tactics from the enumerated list that are present in `failed_tactics_this_session`.
    5.  **Evaluate Remaining Candidates:** If there are any viable candidate tactics left:
        a. For each viable tactic, use `simulate_action` to get its `final_score`.
        b. Choose the tactic with the highest `final_score`.
        c. Use `generate_plan` with the chosen tactic and a clear reasoning. This is your final step.
    6.  **Create a Custom Plan (if necessary):** If ALL standard tactics were discarded (because they failed or none existed), you MUST become creative.
        a. Propose a novel sequence of actions to solve the problem. For a tall obstacle, this might involve a lateral movement.
        b. Use the `propose_custom_tactic` tool to generate this new plan. Provide a descriptive `tactic_name`, `description`, the `action_sequence`, and a strong `justification`. This is your final step.

    **Unbreakable Rules:**
    - Your final answer MUST be only the JSON generated by either the `generate_plan` tool or the `propose_custom_tactic` tool.
    - Do not call `generate_plan` if you are calling `propose_custom_tactic`, and vice-versa.
    - Do not try to build the plan JSON manually. The tools do that for you.

  expected_output: >
    Return ONLY a valid JSON, without markdown or extra text, in the format:
    {{
      "selected_strategy": "string",
      "reasoning": "string",
      "actions": [
        {{
          "id": 1,
          "action": "string",
          "parameters": {{}}
        }}
      ],
      "expected_outcome": "string",
      "is_custom_tactic": false
    }}

  agent: planner_agent