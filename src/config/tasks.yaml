analysis:
  description: >
    Analisar os dados obtidos do Monitor e pelo Metrics Analyser, a fim de identificar anomalias
    nos dados enviados e realizar um diagnostico preciso e detalhado sobre a situação do sistema.
    Além de gerar um diagnostico claro e consistente, que será utilizado pelo Planner para decidir 
    se uma adaptação ou replanejamento da execução é necessário.

    Ultilize esses dados para um melhor diagnóstico:
    {monitor_output}
    {metrics_output}

    The urgency of the situation should be classified as "low", "medium" or "high". 
    The diagnosis should be a clear and concise summary of the current state of the system, 
    highlighting any anomalies or issues that have been identified. 
    The anomalies should be a boolean value indicating whether any anomalies were detected in the data.

  expected_output: >
    {
      "urgency": 
      "diagnosis": 
      "anomalies": 
    }

  agent: analyser_agent
